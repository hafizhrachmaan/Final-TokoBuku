<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard HRD</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css(v=4)}" />
    <style>
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        @media (max-width: 900px) { 
            .grid-layout { grid-template-columns: minmax(0, 1fr); gap: 20px; } 
            .header h1 { font-size: 1.8em; margin: 0; }
            .action-buttons { display: flex; flex-direction: column; gap: 8px; }
            .clay-table th, .clay-table td { padding: 10px 5px; font-size: 0.9em; }
        }
    </style>
</head>
<body class="scrollable">
    <div class="clay-container">
        <div class="brand-logo" style="justify-content: flex-start;">Yudiz Foto Copy & ATK</div>
        <div class="header">
            <h1 style="margin-bottom: 0;">Dashboard HRD</h1>
            <form th:action="@{/logout}" method="post" class="logout-form" style="margin: 0;">
                <button type="submit" class="clay-btn clay-btn-small clay-btn-logout">Logout</button>
            </form>
        </div>
        <p style="margin-top: 15px;">Selamat datang, <strong th:text="${username}"></strong>!</p>

        <div class="grid-layout" style="margin-top: 40px;">
            <!-- Kolom Kiri: Daftar Karyawan -->
            <div style="display: flex; flex-direction: column; gap: 40px;">
                <!-- Permohonan Baru -->
                <div class="clay-card" style="max-width: none;">
                    <h2 style="text-align: left;">Permohonan Baru (<span th:text="${#lists.size(pendingEmployees)}">0</span>)</h2>
                    <div class="clay-table-container">
                        <table class="clay-table">
                            <thead>
                                <tr>
                                    <th>Pelamar</th>
                                    <th>Posisi</th>
                                    <th style="text-align: center;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="pending-employees-tbody">
                                <tr th:if="${#lists.isEmpty(pendingEmployees)}"><td colspan="3" style="text-align: center; padding: 2rem;">Tidak ada permohonan baru.</td></tr>
                                <tr th:each="employee : ${pendingEmployees}" th:id="'pending-row-' + ${employee.id}">
                                    <td>
                                        <p style="font-weight: bold; margin-bottom: 5px;" th:text="${employee.fullName}">Nama Pelamar</p>
                                        <p style="font-size: 0.8em; color: #718096; margin: 0; word-break: break-all;" th:text="${employee.email}">email@pelamar.com</p>
                                    </td>
                                    <td th:text="${employee.role}" style="font-size: 0.9em; font-weight: bold;">KASIR</td>
                                    <td style="text-align: center;" class="action-buttons">
                                        <button type="button" class="accept-btn clay-btn clay-btn-small clay-btn-success" th:attr="data-user-id=${employee.id}">Terima</button>
                                        <button type="button" class="reject-btn clay-btn clay-btn-small clay-btn-danger" th:attr="data-user-id=${employee.id}">Tolak</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Karyawan Aktif -->
                <div class="clay-card" style="max-width: none;">
                    <h2 style="text-align: left;">Karyawan Aktif</h2>
                    <div class="clay-table-container">
                        <table class="clay-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th style="text-align: center;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="verified-employees-tbody">
                                <tr th:if="${#lists.isEmpty(verifiedEmployees)}"><td colspan="2" style="text-align: center; padding: 2rem;">Tidak ada karyawan aktif.</td></tr>
                                <tr th:each="employee : ${verifiedEmployees}" th:id="'verified-row-' + ${employee.id}">
                                    <td>
                                        <p style="font-weight: bold;" th:text="${employee.username}">user</p>
                                        <p style="font-size: 0.8em; color: #718096;" th:text="${employee.role}">ROLE</p>
                                    </td>
                                    <td style="text-align: center;">
                                        <button type="button" class="cut-btn clay-btn clay-btn-small clay-btn-danger" th:attr="data-user-id=${employee.id}">Pecat</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan: Form Tambah -->
            <div class="clay-card" style="max-width: none; text-align: left; align-self: start;">
                <h2>Tambah Karyawan</h2>
                <form id="add-employee-form">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="clay-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="clay-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role / Jabatan</label>
                        <select name="role" class="clay-select">
                            <option th:each="r : ${allRoles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <button id="add-employee-btn" type="button" class="clay-btn">Simpan</button>
                </form>
            </div>
        </div>
    </div>
    <script th:src="@{/js/hrd-dashboard.js}" defer></script>
</body>
</html>
