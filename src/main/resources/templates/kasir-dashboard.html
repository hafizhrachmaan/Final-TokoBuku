<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css(v=3)}" />
    <style>
        body { display: block; }
        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .pos-header {
                flex-direction: column;
                align-items: stretch;
            .pos-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .pos-header > div:last-child { width: 100%; flex-direction: column; align-items: stretch !important; gap: 10px; }
            .pos-header > div:last-child > div, .pos-header > div:last-child > a, .pos-header > div:last-child > form { width: 100% !important; text-align: center; }
            .pos-header > div:last-child input { width: 100%; box-sizing: border-box; }
            .pos-header .clay-btn { width: 100%; }
            .add-to-cart-btn { width: 100%; margin-top: 15px; }
        }
    </style>
</head>
<body class="scrollable">
    <div class="clay-container" style="max-width: 1400px; padding: 15px;">
        <div class="pos-header">
            <div class="header" style="margin-bottom: 0;">
                <h1>POS Terminal</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div>
                    <input type="text" id="productSearch" placeholder="Cari produk..." class="clay-input">
                </div>
                <a th:href="@{/kasir/history}" class="clay-btn clay-btn-small clay-btn-info">Riwayat Transaksi</a>
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="clay-btn clay-btn-small clay-btn-danger">Logout</button>
                </form>
            </div>
        </div>

        <!-- Notifikasi Pop-up -->
        <div th:if="${success}" class="clay-alert clay-alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="clay-alert clay-alert-error" th:text="${error}"></div>

        <div class="pos-layout">
            <!-- Product List -->
            <div class="pos-products">
                <div id="product-list-container" class="pos-products-grid">
                    <div th:each="product : ${products}" class="product-item clay-product-card">
                        <h3 th:text="${product.name}">Nama Barang</h3>
                        <p class="price" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">0</p>
                        <button type="button" class="add-to-cart-btn clay-btn clay-btn-small" th:attr="data-product-id=${product.id}, data-product-name=${product.name}, data-product-price=${product.price}">Tambah</button>
                    </div>
                </div>
            </div>

            <!-- Shopping Cart -->
            <div class="pos-cart clay-card" style="padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">Struk Belanja</h2>
                    <span id="cart-item-count" class="clay-btn clay-btn-small" style="cursor: default;">0 Item</span>
                </div>
                
                <div class="clay-table-container cart-items" style="max-height: 400px; overflow-y: auto;">
                    <div id="cart-items-container">
                        <p style="text-align: center; color: #718096; margin-top: 40px;">Keranjang kosong.</p>
                    </div>
                </div>
                
                <div style="padding-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="font-weight: bold; color: #5a6678;">TOTAL</span>
                        <span id="cart-total" style="font-size: 1.8em; font-weight: bold; color: #4a5568;">Rp 0</span>
                    </div>
                    <form th:action="@{/kasir/checkout}" method="post">
                        <input type="hidden" name="cartData" id="cart-data-input">
                        <button id="checkout-button" type="submit" class="clay-btn" disabled>
                            Proses & Cetak
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/kasir-pos.js}" defer></script>
</body>
</html>
