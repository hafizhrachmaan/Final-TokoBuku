<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css(v=3)}" />
</head>
<body>
    <div class="clay-card">
        <h2>Selamat Datang Kembali</h2>
        <p>Silakan masuk untuk melanjutkan</p>

        <div th:if="${param.error}" class="clay-alert clay-alert-error">
            Username atau password salah.
        </div>
        <div th:if="${param.logout}" class="clay-alert clay-alert-success">
            Anda telah berhasil logout.
        </div>
        <div th:if="${param.registrationSuccess}" class="clay-alert clay-alert-success">
            Registrasi berhasil! Silakan login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="clay-input" placeholder="Masukkan username Anda" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="clay-input" placeholder="Masukkan password Anda" required>
            </div>
            <button type="submit" class="clay-btn">Login</button>
        </form>
        <a th:href="@{/register}" class="link">Belum punya akun? Daftar di sini</a>
    </div>
</body>
</html>
