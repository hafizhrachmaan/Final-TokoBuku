<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}" />
</head>
<body>
    <div class="clay-card">
        <div class="brand-logo">Yudiz Foto Copy & ATK</div>
        <h2>Buat Akun Baru</h2>
        <p>Isi formulir di bawah untuk mendaftar</p>

        <div th:if="${param.error}" class="clay-alert clay-alert-error" th:text="${param.message}">
            Terjadi kesalahan saat registrasi.
        </div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="fullName">Nama Lengkap</label>
                <input type="text" id="fullName" name="fullName" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="phone">No HP</label>
                <input type="text" id="phone" name="phone" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="address">Alamat</label>
                <textarea id="address" name="address" class="clay-input" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="lastEducation">Pendidikan Terakhir</label>
                <input type="text" id="lastEducation" name="lastEducation" class="clay-input" required>
            </div>
            <div class="form-group">
                <label for="workExperience">Pengalaman Kerja</label>
                <textarea id="workExperience" name="workExperience" class="clay-input" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="role">Daftar sebagai</label>
                <select id="role" name="role" class="clay-select" required>
                    <option th:each="roleOpt : ${roles}" th:value="${roleOpt}" th:text="${roleOpt.name()}"></option>
                </select>
            </div>
            <button type="submit" class="clay-btn">Daftar</button>
        </form>
        <a th:href="@{/login}" class="link">Sudah punya akun? Login</a>
    </div>
</body>
</html>
