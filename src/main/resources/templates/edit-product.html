<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Produk</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}" />
</head>
<body>
    <div class="clay-card">
        <h2>Update Produk</h2>
        <form th:action="@{/stocker/product/edit/{id}(id=*{id})}" method="post" th:object="${product}">
            <input type="hidden" name="id" th:value="*{id}">
            
            <div class="form-group">
                <label for="name">Nama Produk</label>
                <input type="text" id="name" name="name" class="clay-input" th:value="*{name}" required>
            </div>
            <div class="form-group">
                <label for="description">Deskripsi</label>
                <input type="text" id="description" name="description" class="clay-input" th:value="*{description}" required>
            </div>
            <div class="form-group">
                <label for="price">Harga</label>
                <input type="number" step="0.01" id="price" name="price" class="clay-input" th:value="*{price}" required>
            </div>
            <div class="form-group">
                <label for="stock">Stok</label>
                <input type="number" id="stock" name="stock" class="clay-input" th:value="*{stock}" required>
            </div>
            
            <button type="submit" class="clay-btn">Simpan Perubahan</button>
            <a th:href="@{/stocker/dashboard}" class="link" style="display: block; text-align: center; margin-top: 20px;">Batal</a>
        </form>
    </div>
</body>
</html>
