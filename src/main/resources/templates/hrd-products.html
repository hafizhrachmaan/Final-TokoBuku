<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{main-layout :: head('Manajemen Produk')}"></head>

<body>
    <div class="app-layout">
        <aside th:replace="~{main-layout :: sidebar}"></aside>
        
        <main class="app-main-content">
            <header class="content-header">
                <h1>Manajemen Produk</h1>
                 <div class="user-info">
                     <span th:text="${username}">User</span>
                     <i data-lucide="user-circle-2"></i>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <h2>Daftar Semua Produk (Read-Only)</h2>
                </div>
                <div class="card-body" style="padding: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nama Produk</th>
                                <th>Deskripsi</th>
                                <th class="text-right">Harga</th>
                                <th class="text-right">Stok</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(allProducts)}">
                                <td colspan="5" class="text-center italic" style="color: var(--clay-text-secondary); padding: 2rem;">Tidak ada produk yang tersedia.</td>
                            </tr>
                            <tr th:each="product : ${allProducts}">
                                <td class="font-mono" style="color: var(--clay-text-secondary);" th:text="${product.id}">1</td>
                                <td class="font-bold" th:text="${product.name}">Nama Produk</td>
                                <td class="text-xs" style="color: var(--clay-text-secondary);" th:text="${product.description}">Deskripsi singkat produk.</td>
                                <td class="text-right font-medium" style="color: var(--clay-primary);" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 10.000</td>
                                <td class="text-right font-bold" th:text="${product.stock}">100</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{main-layout :: scripts}"></div>

</body>
</html>
