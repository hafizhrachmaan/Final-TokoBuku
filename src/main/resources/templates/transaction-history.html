<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}" />
    <style>
        body {
            display: block;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="clay-container">
        <div class="header">
            <h1>Riwayat Transaksi</h1>
            <div>
                <a th:href="@{/kasir/dashboard}" class="clay-btn clay-btn-small clay-btn-info">Kembali ke POS</a>
                <form th:action="@{/logout}" method="post" class="logout-form" style="display: inline-block;">
                    <button type="submit" class="clay-btn clay-btn-small clay-btn-danger">Logout</button>
                </form>
            </div>
        </div>
        <p>Berikut adalah daftar transaksi yang telah Anda proses.</p>

        <div th:if="${param.checkout_success}" class="clay-alert clay-alert-success">
            <span th:text="'Transaksi #' + ${param.checkout_success} + ' Berhasil!'"></span>
        </div>

        <div class="clay-table-container" style="margin-top: 40px;">
            <table class="clay-table">
                <thead>
                    <tr>
                        <th>ID Transaksi</th>
                        <th>Tanggal</th>
                        <th style="text-align: right;">Total Harga</th>
                        <th style="text-align: center;">Struk</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(transactions)}">
                        <td colspan="4" style="text-align: center; padding: 2rem;">Tidak ada riwayat transaksi.</td>
                    </tr>
                    <tr th:each="transaction : ${transactions}">
                        <td th:text="${transaction.id}">1</td>
                        <td th:text="${#temporals.format(transaction.transactionDate, 'dd MMM yyyy, HH:mm')}">01 Jan 2024, 14:00</td>
                        <td style="text-align: right; font-weight: bold;" th:text="${'Rp ' + #numbers.formatDecimal(transaction.totalPrice, 0, 'POINT', 0, 'COMMA')}">Rp 150.000</td>
                        <td style="text-align: center;">
                            <a th:href="@{/kasir/transaction/pdf/{id}(id=${transaction.id})}" target="_blank" class="clay-btn clay-btn-small">Lihat PDF</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
