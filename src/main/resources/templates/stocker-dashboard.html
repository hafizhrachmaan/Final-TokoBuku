<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Stocker</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css(v=3)}" />
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Mobile Popup Styles for Add Product */
        .mobile-add-btn, .close-add-btn {
            display: none;
        }
        
        @media (max-width: 768px) {
            .mobile-add-btn {
                display: block;
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 999;
                padding: 15px 25px;
                font-size: 1.1em;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }
            .add-product-modal {
                position: fixed !important;
                bottom: -100%;
                left: 0;
                width: 100vw;
                height: 85vh;
                max-width: 100vw !important;
                border-radius: 30px 30px 0 0 !important;
                margin: 0 !important;
                z-index: 1000;
                transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                box-sizing: border-box;
                overflow-y: auto;
                padding: 20px !important;
            }
            .add-product-modal.active {
                bottom: 0;
            }
            .close-add-btn {
                display: block;
                position: absolute;
                top: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
                padding: 0;
                border-radius: 50%;
                font-weight: bold;
                font-size: 1.2em;
                line-height: 40px;
                text-align: center;
                z-index: 1001;
            }
        }
    </style>
</head>
<body class="scrollable">
    <div class="clay-container">
        <div class="brand-logo" style="justify-content: flex-start;">Yudiz Foto Copy & ATK</div>
        <div class="header">
            <h1>Dashboard Stocker</h1>
            <div class="header-actions">
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="clay-btn clay-btn-small clay-btn-logout">Logout</button>
                </form>
            </div>
        </div>
        <p>Selamat datang, <strong th:text="${username}"></strong>! Anda login sebagai <strong th:text="${userRole}"></strong>.</p>

        <!-- Floating Add Button for Mobile -->
        <button class="mobile-add-btn clay-btn clay-btn-success" onclick="document.querySelector('.add-product-modal').classList.add('active')">
            ➕ Tambah Produk
        </button>

        <!-- Form Tambah Produk -->
        <div class="clay-card add-product-modal" style="max-width: none; margin-bottom: 40px; text-align: left;">
            <button type="button" class="close-add-btn clay-btn clay-btn-danger clay-btn-small" onclick="document.querySelector('.add-product-modal').classList.remove('active')">X</button>
            <h2>Tambah Produk Baru</h2>
            <form th:action="@{/stocker/product/add}" method="post">
                <div class="form-group">
                    <label for="name">Nama Produk</label>
                    <input type="text" id="name" name="name" class="clay-input" required>
                </div>
                <div class="form-group">
                    <label for="description">Deskripsi</label>
                    <input type="text" id="description" name="description" class="clay-input" required>
                </div>
                <div class="form-group">
                    <label for="price">Harga</label>
                    <input type="number" step="0.01" id="price" name="price" class="clay-input" required>
                </div>
                <div class="form-group">
                    <label for="stock">Stok</label>
                    <input type="number" id="stock" name="stock" class="clay-input" required>
                </div>
                <button type="submit" class="clay-btn" style="width: auto; margin-top: 0;">Simpan Produk</button>
            </form>
        </div>

        <!-- Notifikasi -->
        <div th:if="${success}" class="clay-alert clay-alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="clay-alert clay-alert-error" th:text="${error}"></div>

        <!-- Tabel Produk -->
        <h2>Daftar Produk</h2>
        <div class="clay-table-container">
            <table class="clay-table">
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Nama</th>
                        <th>Deskripsi</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product, iterStat : ${products}">
                        <td th:text="${iterStat.count}">1</td>
                        <td th:text="${product.name}">Buku Java</td>
                        <td th:text="${product.description}">Buku untuk pemula</td>
                        <td th:text="${#numbers.formatCurrency(product.price)}">Rp 150.000</td>
                        <td th:text="${product.stock}">10</td>
                        <td>
                            <a th:href="@{/stocker/product/edit/{id}(id=${product.id})}" class="clay-btn clay-btn-small">Edit</a>
                            <a th:href="@{/stocker/product/delete/{id}(id=${product.id})}" class="clay-btn clay-btn-small clay-btn-danger" onclick="return confirm('Anda yakin ingin menghapus produk ini?')">Hapus</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
